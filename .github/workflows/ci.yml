name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run test suite
        run: pytest -q

      - name: Smoke-test the CLI on the sample configs
        run: |
          python -m aos8_acl_converter convert examples/sample_aos8.cfg --report
          python -m aos8_acl_converter convert examples/bridge_mode.cfg --bridge-mode --report
          python -m aos8_acl_converter convert examples/sample_aos8.cfg --output json > /dev/null
