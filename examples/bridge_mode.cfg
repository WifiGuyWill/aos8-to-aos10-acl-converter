!
! Sample AOS 8 config emphasizing rules that behave differently in BRIDGE mode.
! Run with --bridge-mode to see the enforcement-difference advisories.
!
ip access-list session branch-acl
  user any svc-dns permit
  user controller-ip svc-https redirect tunnel 10
  user any app netflix deny
  user any webcategory streaming-media deny
  user any webreputation suspicious deny
  user any any dual-nat
  user any any permit
!
user-role branch-user
  access-list session branch-acl
!
