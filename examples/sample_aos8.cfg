!
! Sample AOS 8 running-config fragment: session ACLs + user roles
! Demonstrates: any-any role expansion, host/network/alias sources,
! net-service and app/web DPI rules, NAT and redirect actions, IPv6.
!
netdestination internal-networks
  network 10.0.0.0 255.0.0.0
  network 172.16.0.0 255.240.0.0
!
ip access-list session corp-acl
  user any svc-dns permit
  user any svc-http permit
  user any svc-https permit
  user network 10.0.0.0 255.0.0.0 any permit
  user host 10.1.1.50 tcp 3389 deny log
  any any app facebook deny
  any any appcategory peer-to-peer deny
  any any webcategory gambling deny
  any any webreputation high-risk deny
  user any any permit
!
ip access-list session guest-acl
  user any svc-dhcp permit
  user any svc-dns permit
  user host 10.1.1.1 tcp 80 dst-nat 10.99.0.10 8080
  user any svc-http src-nat
  any any any deny log
!
ipv6 access-list session corp-v6
  user any icmpv6 permit
  network 2001:db8::/32 any any permit
!
user-role corp
  access-list session global-sacl
  access-list session corp-acl
  access-list session corp-v6
!
user-role guest
  access-list session guest-acl
!
